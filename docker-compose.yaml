services:
    redis:
        image: redis:alpine
        command: [ redis-server, --maxmemory 128mb, --maxmemory-policy volatile-lru, --save "" ]

    rabbitmq:
        image: rabbitmq:alpine
        volumes:
            - opendxp-rabbitmq:/var/lib/rabbitmq/

    db:
        image: mariadb:10.11
        working_dir: /application
        command: [ mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_general_ci, --innodb-file-per-table=1 ]
        volumes:
            - opendxp-database:/var/lib/mysql
        environment:
            - MYSQL_ROOT_PASSWORD=ROOT
            - MYSQL_DATABASE=opendxp
            - MYSQL_USER=opendxp
            - MYSQL_PASSWORD=opendxp
        healthcheck:
            # The service is considered healthy when:
            # - connection to opendxp db can be established, and
            # - we can run a simple SQL query.
            test: [ "CMD-SHELL", "mysql -h db -u$$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SHOW TABLES;'" ]
            interval: 10s
            retries: 6
            start_period: 1m
            timeout: 3s

    nginx:
        image: nginx:stable-alpine
        ports:
            - "80:80"
        volumes:
            - .:/var/www/html:ro
            - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php

    php:
        #user: '1000:1000' # set to your uid:gid
        image: open-dxp/opendxp:php8.3-debug-latest
        environment:
            COMPOSER_HOME: /var/www/html
            PHP_IDE_CONFIG: serverName=localhost
            # Feed installer configuration via ENV variables.
            # See: doc/Development_Documentation/Getting_Started/Advanced_Installation_Topics.html#page_Advanced-Installation-Topics
            OPENDXP_INSTALL_MYSQL_USERNAME: opendxp
            OPENDXP_INSTALL_MYSQL_PASSWORD: opendxp
            OPENDXP_INSTALL_MYSQL_PORT: 3306
            OPENDXP_INSTALL_MYSQL_HOST_SOCKET: db
            OPENDXP_INSTALL_MYSQL_DATABASE: opendxp
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - .:/var/www/html
            - ./.docker/messenger.yaml:/var/www/html/config/packages/messenger.yaml:ro

    supervisord:
        #user: '1000:1000' # set to your uid:gid
        image: open-dxp/opendxp:php8.3-supervisord-latest
        depends_on:
            rabbitmq:
                condition: service_started
            db:
                condition: service_healthy
        volumes:
            - .:/var/www/html
            - ./.docker/messenger.yaml:/var/www/html/config/packages/messenger.yaml:ro
            - ./.docker/supervisord.conf:/etc/supervisor/conf.d/opendxp.conf:ro

    # The following two services are used for testing.
    # We restrict these services to the test profile only, so we don't spin them up with every `docker compose up`.
    # See: https://docs.docker.com/compose/profiles/
    test-db:
        profiles: [ 'test' ]
        extends: db
        volumes:
            - opendxp-test-database:/var/lib/mysql

    test-php:
        profiles: [ 'test' ]
        extends: php
        environment:
            APP_ENV: test
            OPENDXP_TEST_DB_DSN: ${OPENDXP_TEST_DB_DSN:-mysql://opendxp:opendxp@test-db/opendxp}
            OPENDXP_INSTALL_ADMIN_USERNAME: opendxp
            OPENDXP_INSTALL_ADMIN_PASSWORD: opendxp
            OPENDXP_INSTALL_MYSQL_HOST_SOCKET: test-db
        depends_on:
            test-db:
                condition: service_healthy
        volumes:
            - opendxp-test-var:/var/www/html/var
            - opendxp-test-public-var:/var/www/html/public/var

volumes:
    opendxp-database:
    opendxp-rabbitmq:
    opendxp-test-database:
    opendxp-test-var:
    opendxp-test-public-var:
